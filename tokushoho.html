<!doctype html><html lang=ja><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>特定商取引法に基づく表記</title></head><body style='font-family:system-ui,sans-serif;max-width:760px;margin:2rem auto;padding:0 1rem'><h1>特定商取引法に基づく表記</h1><table style='border-collapse:collapse'><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>販売事業者</th><td style='padding:.4rem 1rem'>（事業者名を記入）</td></tr><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>運営責任者</th><td style='padding:.4rem 1rem'>（運営責任者名を記入）</td></tr><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>所在地</th><td style='padding:.4rem 1rem'>（所在地を記入）</td></tr><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>連絡先メール</th><td style='padding:.4rem 1rem'>support@example.com</td></tr><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>販売価格</th><td style='padding:.4rem 1rem'>月額500円（税込）／記事単品100円（税込）</td></tr><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>支払方法</th><td style='padding:.4rem 1rem'>クレジットカード（外部決済サービス）</td></tr><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>支払時期</th><td style='padding:.4rem 1rem'>申込時に課金、以後毎月自動更新</td></tr><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>提供時期</th><td style='padding:.4rem 1rem'>決済完了後ただちに会員機能を提供</td></tr><tr><th style='text-align:left;padding:.4rem 1rem;vertical-align:top'>解約・返金</th><td style='padding:.4rem 1rem'>マイページからいつでも解約可（当月末まで有効）。期間途中の日割り返金なし。単品購入は役務提供完了後の返金不可</td></tr></table><p><a href='index.html'>← トップへ</a></p></body></html>
