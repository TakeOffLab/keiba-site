<!doctype html><html lang=ja><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>仮想運用の集計</title><style>
*{box-sizing:border-box}
body{font-family:system-ui,"Hiragino Sans",sans-serif;max-width:820px;margin:2rem auto;padding:0 1.2rem;line-height:1.75;color:#1a1a1a;background:#fafaf8}
h1{font-size:1.6rem;margin-bottom:.25rem}
h2{font-size:1.05rem;margin-top:1.8rem;border-left:4px solid #2e7d52;padding-left:.6rem;color:#1a3a2a}
.subtitle{color:#666;font-size:.9rem;margin-bottom:1.2rem}
.race-meta{background:#f5f5f0;border-radius:8px;padding:.7rem 1rem;margin:.5rem 0 1rem;font-size:.88rem;color:#444;display:flex;flex-wrap:wrap;gap:.4rem 1.2rem}
.race-meta span{white-space:nowrap}
.race-card{border:1px solid #d8e8d8;border-radius:10px;padding:1rem 1.2rem;margin:1rem 0;background:#fff}
.race-card h2{margin-top:.3rem;border:none;padding:0;font-size:1.1rem;color:#1a3a2a}
.race-card .meta{font-size:.85rem;color:#777;margin:.25rem 0 .5rem}
.race-card a{color:#2e7d52;text-decoration:none;font-weight:600}
.tendency-box{background:#f0f7f3;border-radius:8px;padding:.8rem 1rem;margin:.5rem 0}
.course-card{background:#fff;border:1px solid #d8e8d8;border-radius:8px;padding:.8rem 1rem;margin:.5rem 0}
.course-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.5rem}
.tag{background:#e8f4ec;color:#1a4a2a;font-size:.8rem;padding:.2rem .6rem;border-radius:12px;white-space:nowrap}
.tag.warn{background:#fff3e0;color:#6b3a00}
.course-summary{color:#444;font-size:.9rem;margin:.4rem 0 0;line-height:1.65}
.key-factors{margin:.3rem 0 0;padding-left:1.2rem;font-size:.84rem;color:#444}
.entry-list{margin:.3rem 0}
.entry-row{border-bottom:1px solid #ebebeb;padding:.65rem 0}
.entry-row:last-child{border-bottom:none}
.entry-head{display:flex;align-items:center;flex-wrap:wrap;gap:.3rem .5rem;margin-bottom:.25rem}
.gate{display:inline-flex;align-items:center;justify-content:center;width:1.5rem;height:1.5rem;border-radius:50%;font-size:.78rem;font-weight:700;flex-shrink:0}
.g1{background:#fff;color:#333;border:2px solid #bbb}.g2{background:#111;color:#fff}
.g3{background:#d00;color:#fff}.g4{background:#00c;color:#fff}
.g5{background:#dd0;color:#333}.g6{background:#080;color:#fff}
.g7{background:#f80;color:#fff}.g8{background:#e8a0a0;color:#600}
.horse-num{font-size:.82rem;color:#888;min-width:1.6rem}
.horse-name{font-weight:700;font-size:.98rem}
.horse-meta{font-size:.82rem;color:#777}
.jockey{font-size:.85rem;color:#2e5a8a;font-weight:600}
.sire-info{font-size:.8rem;color:#777;font-style:italic}
.form-history{padding-left:.2rem}
.form-row{display:flex;flex-wrap:wrap;gap:.15rem .8rem;font-size:.81rem;margin:.05rem 0}
.fpos{font-weight:700;min-width:2.2rem}
.pos1{color:#b8860b}.pos2{color:#607d8b}.pos3{color:#8e6b3a}
.frace{color:#444}
.fdist{color:#888}
.fagari{color:#2e7d52}
.no-form{font-size:.82rem;color:#bbb;font-style:italic}
.eval-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.45rem;margin:.55rem 0 0}
.eval-item{background:#fafcf9;border:1px solid #e3eee4;border-radius:7px;padding:.45rem .55rem}
.eval-label{display:block;font-size:.72rem;color:#477052;font-weight:700;margin-bottom:.15rem}
.eval-text{font-size:.8rem;color:#444;line-height:1.65;white-space:pre-line}
.factor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:.45rem;margin:.6rem 0 0}
.factor-item{background:#fff;border:1px solid #dceadc;border-radius:7px;padding:.5rem .6rem}
.factor-label{display:flex;align-items:center;gap:.35rem;font-size:.74rem;color:#204c2e;font-weight:800;margin-bottom:.18rem}
.factor-score{display:inline-flex;align-items:center;justify-content:center;min-width:1.25rem;height:1.25rem;border-radius:50%;background:#e8f4ec;color:#1a4a2a;font-size:.74rem}
.factor-text{font-size:.8rem;color:#3f3f3f;line-height:1.7;white-space:pre-line}
.rating-badge{display:inline-flex;align-items:center;justify-content:center;min-width:1.35rem;height:1.35rem;border-radius:50%;background:#2e7d52;color:#fff;font-weight:700;font-size:.82rem;margin-right:.35rem}
.notice{background:#fff8e6;border:1px solid #ead79b;border-radius:8px;padding:.65rem .85rem;color:#5c4700;font-size:.86rem;margin:.7rem 0}
.bet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.7rem;margin:.6rem 0}.bet-panel{border:1px solid #d8e8d8;border-radius:8px;padding:.75rem;background:#fff}.bet-panel h3{margin:0 0 .35rem;font-size:.95rem;color:#1a3a2a}.bet-line{font-size:.85rem;margin:.25rem 0}.bet-meta{font-size:.8rem;color:#666}
.cta-block{margin:2rem 0;background:#e8f4ec;border:1px solid #b8d8c4;border-radius:10px;padding:1.2rem 1.4rem;text-align:center}
.cta-block p{margin:.3rem 0;color:#2a4a35;font-size:.95rem}
.cta{display:inline-block;background:#2e7d52;color:#fff!important;padding:.65rem 1.4rem;border-radius:7px;text-decoration:none;font-weight:600;margin-top:.7rem;font-size:1rem}
.cta:hover{background:#235e3e}
.nav{margin:1.5rem 0 .5rem;font-size:.9rem}
.nav a{color:#2e7d52}
.toc{display:flex;gap:.4rem;overflow-x:auto;padding:.25rem 0 .55rem;margin:.2rem 0 .8rem;border-bottom:1px solid #d8e8d8}.toc a{flex:0 0 auto;color:#1a4a2a;background:#e8f4ec;border-radius:6px;padding:.3rem .55rem;font-size:.8rem;text-decoration:none;font-weight:700}
.disclaimer{color:#888;font-size:.8rem;border-top:1px solid #e0e0e0;margin-top:2.5rem;padding-top:1rem}
a{color:#2e7d52}
@media(max-width:600px){.entry-head{gap:.2rem .4rem}.form-row{gap:.1rem .5rem}}
</style></head><body><h1>仮想運用の集計</h1><div class=race-card><h2>本番</h2><p>1レース / 投資 200円 / 払戻 円 / 回収率 0.0%</p></div><div class=race-card><h2>事後・参考</h2><p>68レース / 投資 66200円 / 払戻 57490円 / 回収率 86.8%</p></div><p class=disclaimer>本サイトは考察であり的中・利益を保証しません。馬券購入は自己責任で。</p></body></html>
